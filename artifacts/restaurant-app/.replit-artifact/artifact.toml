kind = "web"
previewPath = "/"
title = "Fork & Find — Restaurant Discovery"
version = "1.0.0"
id = "artifacts/restaurant-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19460

[services.development]
run = "pnpm --filter @workspace/restaurant-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/restaurant-app", "run", "build" ]
publicDir = "artifacts/restaurant-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19460"
BASE_PATH = "/"
